<!DOCTYPE html>
<html>
<head>
  <title>Free GeoJSON Viewer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Leaflet CSS (free & open-source) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body { margin: 0; height: 100%; width: 100%; }
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Get the ?gist= parameter from URL
    function getGistId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("gist");
    }

    // Fetch raw GeoJSON URL from GitHub Gist API
    async function loadGeoJsonRawUrl(gistId) {
      const apiUrl = `https://api.github.com/gists/${gistId}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error("Failed to fetch Gist");
      const gist = await res.json();
      const geoFile = Object.values(gist.files).find(f => f.filename.endsWith(".geojson"));
      if (!geoFile) throw new Error("No .geojson file found in the Gist");
      return geoFile.raw_url;
    }

    // Initialize Leaflet map
    async function initMap() {
      const gistId = getGistId();
      if (!gistId) {
        alert("Please provide a gist ID in the URL, e.g. ?gist=YOUR_GIST_ID");
        return;
      }

      const map = L.map("map").setView([0,0], 2);

      // Free OpenStreetMap tiles
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '' // no visible copyright
      }).addTo(map);

      try {
        const rawUrl = await loadGeoJsonRawUrl(gistId);
        const geojson = await fetch(rawUrl).then(r => r.json());
        const layer = L.geoJSON(geojson).addTo(map);
        map.fitBounds(layer.getBounds());
      } catch (err) {
        alert(err.message);
        console.error(err);
      }
    }

    window.onload = initMap;
  </script>
</body>
</html>
