<!DOCTYPE html>
<html>
<head>
  <title>Advanced GeoJSON Viewer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body { margin: 0; height: 100%; width: 100%; }
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let geoLayer;

// Extract gist id
function getGistId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("gist");
}

// Fetch GeoJSON URL
async function loadGeoJsonRawUrl(gistId) {
  const res = await fetch(`https://api.github.com/gists/${gistId}`);
  const gist = await res.json();

  const geoFile = Object.values(gist.files)
    .find(f => f.filename.endsWith(".geojson"));

  if (!geoFile) throw new Error("No .geojson found");
  return geoFile.raw_url;
}

// Initialize map
async function initMap() {
  const gistId = getGistId();
  if (!gistId) {
    alert("Use ?gist=YOUR_GIST_ID");
    return;
  }

  // --- Base Layers ---
  const osm = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: "OSM" }
  );

  const satellite = L.tileLayer(
    'https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
    {
      maxZoom: 20,
      subdomains: ['mt0','mt1','mt2','mt3']
    }
  );

  const hybrid = L.tileLayer(
    'https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
    {
      maxZoom: 20,
      subdomains: ['mt0','mt1','mt2','mt3']
    }
  );

  const terrain = L.tileLayer(
    'https://{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}',
    {
      maxZoom: 20,
      subdomains: ['mt0','mt1','mt2','mt3']
    }
  );

  // Create map
  map = L.map("map", {
    center: [20, 0],
    zoom: 2,
    layers: [osm]
  });

  // Layer control
  const baseMaps = {
    "🗺️ Road Map": osm,
    "🛰️ Satellite": satellite,
    "🌍 Hybrid": hybrid,
    "⛰️ Terrain": terrain
  };

  L.control.layers(baseMaps).addTo(map);

  try {
    const rawUrl = await loadGeoJsonRawUrl(gistId);
    const geojson = await fetch(rawUrl).then(r => r.json());

    if (geoLayer) map.removeLayer(geoLayer);

    // --- FIXED RENDERING ---
    geoLayer = L.geoJSON(geojson, {

      // Style for lines & polygons
      style: function (feature) {
        return {
          color: "#3388ff",
          weight: 2,
          fillOpacity: 0.3
        };
      },

      // Proper point rendering
      pointToLayer: function (feature, latlng) {
        return L.circleMarker(latlng, {
          radius: 4,
          fillColor: "#ff7800",
          color: "#000",
          weight: 1,
          opacity: 1,
          fillOpacity: 0.8
        });
      },

      // Optional popup
      onEachFeature: function (feature, layer) {
        if (feature.properties) {
          layer.bindPopup(JSON.stringify(feature.properties, null, 2));
        }
      }

    }).addTo(map);

    map.fitBounds(geoLayer.getBounds());

  } catch (err) {
    alert("Error: " + err.message);
    console.error(err);
  }
}

window.onload = initMap;
</script>
</body>
</html>
